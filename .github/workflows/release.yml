name: Release

on:
  push:
    tags:
      # Trigger on tags like: ai-jue@v1.0.0, @scope/pkg@v2.0.0
      - '*@v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    # REQUIRED for Trusted Publishing (OIDC)
    permissions:
      contents: write  # For creating GitHub Release
      id-token: write  # For npm provenance & OIDC auth
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          # No token needed here for OIDC, setup-node handles it if id-token permission exists

      - name: Install Dependencies
        run: npm ci

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Build
        run: npm run build

      - name: Publish Package (Trusted)
        run: node .github/scripts/publish-manager.js
        env:
          # CI=true is often needed for some build scripts
          CI: true
          # NODE_AUTH_TOKEN is NOT needed for Trusted Publishing OIDC flow
          # But we pass GITHUB_TOKEN if we want to create releases (optional step below)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          generate_release_notes: true
          files: |
            packages/*/dist/*.tgz

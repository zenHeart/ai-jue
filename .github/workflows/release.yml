name: Release

on:
  push:
    tags:
      # Trigger on tags like: ai-jue@v1.0.0, @scope/pkg@v2.0.0
      - '*@v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to publish (e.g. ai-jue-core@v1.0.6)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    # REQUIRED for Trusted Publishing (OIDC)
    permissions:
      contents: write  # For creating GitHub Release
      id-token: write  # For npm provenance & OIDC auth
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          # No token needed here for OIDC, setup-node handles it if id-token permission exists

      - name: Resolve Tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Dependencies
        run: npm ci

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Build
        run: npm run build

      - name: Publish Package (Trusted)
        run: node .github/scripts/publish-manager.js
        env:
          CI: true
          GITHUB_REF: ${{ steps.tag.outputs.ref }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          generate_release_notes: true
          # body_path: release-note.md # Optional: Use the note generated locally if committed
          files: |
            packages/*/dist/*.tgz

      - name: Upload npm logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-logs
          path: ~/.npm/_logs

name: Release

on:
  push:
    tags:
      - '*@v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to filter (leave empty to publish all items in release-note.md)'
        required: false
        type: string

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      items: ${{ steps.parse.outputs.items }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Parse Release Note
        id: parse
        run: |
          if [ -f "release-note.md" ]; then
            TAG="${{ github.event.inputs.tag || github.ref_name }}"
            ITEMS=$(node .github/scripts/parse-release-note.js release-note.md --tag "$TAG")
            echo "Parsed items: $ITEMS"
            echo "items=$ITEMS" >> $GITHUB_OUTPUT
          else
            echo "release-note.md not found, skipping."
            echo "items=[]" >> $GITHUB_OUTPUT
            exit 1
          fi

  publish:
    needs: prepare
    if: needs.prepare.outputs.items != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJson(needs.prepare.outputs.items) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build -w ${{ matrix.item.name }}

      - name: Pack
        id: pack
        run: |
          cd packages/${{ matrix.item.dir }}
          npm pack
          echo "tgz=${{ matrix.item.tgz }}" >> $GITHUB_OUTPUT

      - name: Publish
        working-directory: packages/${{ matrix.item.dir }}
        run: |
          npm publish "${{ steps.pack.outputs.tgz }}" --access public

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Build
      run: npm run build
      
    - name: Test
      run: npm test

    - name: Adapter Matrix Test
      run: npx vitest packages/ai-jue/test/adapter-matrix.test.ts

    - name: Base i18n Check
      run: npm run check-base-i18n

    - name: Smoke Apply (base/internal)
      run: npm run smoke-apply

    - name: Security Audit
      run: npm audit --audit-level=high --omit=dev
